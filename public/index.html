          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M68 44.4375V50.9994H74.7979V44.4375H68Z"
            fill="white"
          ></path>
        </svg>
      </div>
      <nav class="header-nav">
        <ul class="nav-menu">
          <li>
            <button id="runBtn" onclick="runTests()">Запуск Теста</button>
          </li>
          <li>
            <button
              id="reportBtn"
              onclick="window.open('/report/index.html', '_blank')"
            >
              Подробный Playwright Отчет
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-content">
      <div id="resultsPanel" class="results-panel hidden">
        <div class="results-header">
          <div class="header-content">
            <h3 id="summary" class="summary-title"></h3>
            <button class="close-btn" onclick="hideResults()">✕</button>
          </div>
        </div>

        <div class="table-container">
          <table id="testsTable" class="tests-table">
            <thead class="tests-table-head">
              <tr>
                <th class="col-testcase">Test Case</th>
                <th class="col-status">Status</th>
                <th class="col-time">Time</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- ТАБЛИЦА ИСТОРИИ ЗАПУСКОВ -->
      <div id="historyPanel" class="history-panel">
        <h2 class="history-title">История запусков</h2>
        <table id="historyTable" class="history-table">
          <thead class="history-table-head">
            <tr>
              <th class="col-date">Дата запуска</th>
              <th class="col-result">Результат</th>
              <th class="col-actions">Действия</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <!-- Заполняется JS -->
          </tbody>
        </table>
      </div>
    </main>

    <script>
      let testHistory = [];
      let currentRun = null;

      // Запуск тестов
      async function runTests() {
        const btn = document.getElementById("runBtn");
        btn.disabled = true;
        btn.innerText = "Тестирую...";

        try {
          const res = await fetch("/run-tests");
          const result = await res.json();

          currentRun = {
            timestamp: result.timestamp,
            date: new Date(result.timestamp).toLocaleString("ru-RU"),
            status: result.status,
            passed: result.summary.passed,
            total: result.summary.total,
          };

          btn.innerText = "Запуск Теста";
          btn.disabled = false;

          showResults(result);
        } catch (e) {
          btn.innerText = "Запуск Теста";
          btn.disabled = false;
          alert("Error: " + e.message);
        }
      }

      //  Детальная таблица результатов
      function showResults(result) {
        const summaryEl = document.getElementById("summary");
        const resultsPanel = document.getElementById("resultsPanel");
        const tbody = document.querySelector("#testsTable tbody");

        if (!summaryEl || !resultsPanel || !tbody) {
          console.error("❌ Элементы не найдены!", {
            summaryEl,
            resultsPanel,
            tbody,
          });
          return;
        }

        const passed = result.summary.passed;
        const total = result.summary.total;
        const statusEmoji = result.status === "PASSED" ? "✅" : "❌";
        summaryEl.innerHTML = `${statusEmoji} <strong>${result.status}</strong> (${passed}/${total})`;

        tbody.innerHTML = result.tests
          .map(
            (test) => `
    <tr class="test-row">
      <td class="test-title">${test.title}</td>
      <td class="col-status">
        <span class="status-badge ${test.status === "passed" ? "status-passed" : "status-failed"}">
          ${test.status.toUpperCase()}
        </span>
      </td>
      <td class="test-duration">${Math.round(test.duration / 1000)}s</td>
    </tr>
  `,
          )
          .join("");

        resultsPanel.classList.remove("hidden");
      }

      function hideResults() {
        const resultsPanel = document.getElementById("resultsPanel");

        if (resultsPanel) {
          resultsPanel.classList.add("hidden");
        }

        if (currentRun) {
          testHistory.unshift(currentRun);
          if (testHistory.length > 10) testHistory = testHistory.slice(0, 10);
          updateHistoryTable();
          currentRun = null;
        }
      }

      function updateHistoryTable() {
        const tbody = document.getElementById("historyBody");
        if (!tbody) return;

        const recentHistory = testHistory.slice(0, 10);
        tbody.innerHTML =
          recentHistory
            .map(
              (run, index) => `
    <tr class="history-row">
      <td class="history-date">${run.date}</td>
      <td class="col-result">
        <span class="history-badge ${run.status === "PASSED" ? "history-passed" : "history-failed"}">
          ${run.passed}/${run.total}
        </span>
      </td>
      <td class="col-actions">
        <button class="history-btn" onclick="showDetails(${index})">
          Подробно
        </button>
      </td>
    </tr>
  `,
            )
            .join("") ||
          '<tr><td colspan="3" class="no-history">Нет запусков</td></tr>';
      }

      function showDetails(index) {
        const run = testHistory[index];
        alert(
          `Запуск ${run.date}\n${run.passed}/${run.total} тестов (${run.status})`,
        );
      }

      function openReport() {
        window.open("/report/index.html", "_blank");
        hideResults();
      }

      window.onload = function () {
        fetch("/history")
          .then((res) => res.json())
          .then((history) => {
            testHistory = history.map((run) => ({
              timestamp: run.timestamp,
              date: new Date(run.timestamp).toLocaleString("ru-RU"),
              status: run.status,
              passed: run.summary.passed,
              total: run.summary.total,
            }));
            updateHistoryTable();
          })
          .catch(() => {
            console.log("История пуста или недоступна");
            updateHistoryTable();
          });
      };
    </script>
    <div class="bean-image">
      <img
        src="Mr_Bean_Image.png"
        alt="Mr Bean"
        style="width: 150px; height: auto"
      />
    </div>
  </body>
</html>
