<main style="min-height: calc(100vh - 80px); padding: 40px 20px; max-width: 1400px; margin: 0 auto;">
    <div id="resultsPanel" style="
        display:none; 
        position: relative;
        width:100%; max-width:1200px; 
        max-height:70vh; margin: 0 auto;
        background:white; 
        border-radius:12px;
        box-shadow:0 20px 60px rgba(0,0,0,0.3); 
        z-index:999; 
        overflow:hidden;
    ">
        <!-- Заголовок -->
        <div style="padding:20px 25px; background:#f8fafc; border-bottom:3px solid #10b981;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="summary" style="margin:0; font-size:22px; font-weight:600;"></h3>
                <button onclick="hideResults()" style="
                    background:none; border:none; font-size:24px; cursor:pointer; 
                    color:#6b7280; padding:5px; border-radius:50%; width:36px; height:36px;
                ">✕</button>
            </div>
        </div>

        <!-- ТАБЛИЦА С СКРОЛЛОМ -->
        <div style="max-height:500px; overflow:auto;">
            <table id="testsTable" style="
                width:100%; border-collapse:collapse; font-family:-apple-system,Segoe UI,sans-serif; font-size:14px;
            ">
                <thead style="position:sticky; top:0; background:#f8fafc; z-index:10;">
                    <tr>
                        <th style="padding:15px 12px 12px 20px; text-align:left; font-weight:600; color:#374151;">Test Case</th>
                        <th style="padding:15px 12px; width:90px; text-align:center; font-weight:600; color:#374151;">Status</th>
                        <th style="padding:15px 12px; width:70px; text-align:right; font-weight:600; color:#374151;">Time</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<script>

let testHistory = [];
let currentRun = null;  // Текущий прогон для истории

// Запуск тестов 
async function runTests() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    btn.innerText = 'Тестирую...';

    try {
        const res = await fetch('/run-tests');
        const result = await res.json();

        // СОХРАНЯЕМ ТЕКУЩИЙ ПРОГОН для истории
        currentRun = {
            timestamp: result.timestamp,
            date: new Date(result.timestamp).toLocaleString('ru-RU'),
            status: result.status,
            passed: result.summary.passed,
            total: result.summary.total
        };

        btn.innerText = 'Запуск Теста';
        btn.disabled = false;

        // Показываем детальную таблицу
        showResults(result);
        
    } catch (e) {
        btn.innerText = 'Запуск Теста';
        btn.disabled = false;
        alert('Error: ' + e.message);
    }
}

//  Детальная таблица результатов (работает как раньше)
function showResults(result) {
    const passed = result.summary.passed;
    const total = result.summary.total;
    const statusEmoji = result.status === 'PASSED' ? '✅' : '❌';
    
    document.getElementById('summary').innerHTML = 
        `${statusEmoji} <strong>${result.status}</strong> (${passed}/${total})`;
    
    const tbody = document.querySelector('#testsTable tbody');
    tbody.innerHTML = result.tests.map((test, index) => `
        <tr style="border-bottom:1px solid #f1f5f9;">
            <td style="padding:14px 12px 14px 20px; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                ${test.title}
            </td>
            <td style="padding:14px 12px; text-align:center;">
                <span style="
                    padding:6px 12px; border-radius:20px; font-size:13px; font-weight:500;
                    ${test.status === 'passed' ? 
                        'background:#d1fae5; color:#065f46' : 
                        'background:#fee2e2; color:#991b1b'
                    }
                ">${test.status.toUpperCase()}</span>
            </td>
            <td style="padding:14px 12px; text-align:right; color:#6b7280; font-family:monospace;">
                ${Math.round(test.duration/1000)}s
            </td>
        </tr>
    `).join('');
    
    document.getElementById('resultsPanel').style.display = 'block';
    /*const reportBtn = document.getElementById('reportBtn');
if (reportBtn) {
    reportBtn.style.background = result.status === 'PASSED' ? '#10b981' : '#ef4444'; 
} */
}

// ЗАКРЫТИЕ — ДОБАВЛЯЕМ В ИСТОРИЮ
function hideResults() {
    document.getElementById('resultsPanel').style.display = 'none';
    
    //  СОХРАНЯЕМ В ИСТОРИЮ ПРИ ЗАКРЫТИИ
    if (currentRun) {
        testHistory.unshift(currentRun);
        if (testHistory.length > 10) testHistory = testHistory.slice(0, 10);
        updateHistoryTable();
        currentRun = null;  // Очищаем
    }
}

// Обновление таблицы истории
function updateHistoryTable() {
    const tbody = document.getElementById('historyBody');
    
    const recentHistory = testHistory.slice(0, 10);
    tbody.innerHTML = recentHistory.map((run, index) => `
        <tr style="border-bottom: 1px solid #e5e7eb;">
            <td style="padding: 16px 15px; font-size: 15px; color: #e5e7eb;">
                ${run.date}
            </td>
            <td style="padding: 16px 15px; text-align: center;">
                <span style="
                    padding: 8px 16px; border-radius: 25px; font-weight: 600; font-size: 14px;
                    ${run.status === 'PASSED' ? 
                        'background: #d1fae5; color: #065f46' : 
                        'background: #fee2e2; color: #991b1b'
                    }
                ">
                    ${run.passed}/${run.total}
                </span>
            </td>
            <td style="padding: 16px 15px; text-align: center;">
                <button onclick="showDetails(${index})" style="
                    background: #3b82f6; color: white; border: none; 
                    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
                ">Подробно</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="3" style="padding: 40px; text-align: center; color: #9ca3af;">Нет запусков</td></tr>';
}

// Подробности прогона
function showDetails(index) {
    const run = testHistory[index];
    alert(`Запуск ${run.date}\n${run.passed}/${run.total} тестов (${run.status})`); 
}

// Открыть HTML отчет
function openReport() {
    window.open('/report/index.html', '_blank');
    hideResults();
}

// Загрузка истории при старте
window.onload = function() {
    fetch('/history')
        .then(res => res.json())
        .then(history => {
            testHistory = history.map(run => ({
                timestamp: run.timestamp,
                date: new Date(run.timestamp).toLocaleString('ru-RU'),
                status: run.status,
                passed: run.summary.passed,
                total: run.summary.total
            }));
            updateHistoryTable();
        })
        .catch(() => {
            console.log('История пуста или недоступна');
            updateHistoryTable();  // Показать "Нет запусков"
        });
};
</script>
