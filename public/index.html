<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Run 3snet</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <nav class="header-nav">
        <ul class="nav-menu">
          <li>
            <button id="runBtn" onclick="runTests()">Run Tests</button>
          </li>
          <li>
            <button
              id="reportBtn"
              onclick="window.open('/report/index.html', '_blank')"
            >
              Detailed Playwright Report
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-content">
      <div id="resultsPanel" class="results-panel hidden">
        <div class="results-header">
          <div class="header-content">
            <h3 id="summary" class="summary-title"></h3>
            <button class="close-btn" onclick="hideResults()">✕</button>
          </div>
        </div>

        <div class="table-container">
          <table id="testsTable" class="tests-table">
            <thead class="tests-table-head">
              <tr>
                <th class="col-testcase">Test Case</th>
                <th class="col-status">Status</th>
                <th class="col-time">Time</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Run History Tables -->
      <div id="historyPanel" class="history-panel">
        <h2 class="history-title">Run History</h2>
        <table id="historyTable" class="history-table">
          <thead class="history-table-head">
            <tr>
              <th class="col-date">Run Date</th>
              <th class="col-result">Result</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <!-- Filling JS -->
          </tbody>
        </table>
      </div>
    </main>

    <script>
      let testHistory = [];
      let currentRun = null;

      // Run tests and fetch results
      async function runTests() {
        const btn = document.getElementById("runBtn");
        btn.disabled = true;
        btn.innerText = "Running Tests...";

        try {
          const res = await fetch("/run-tests");
          const result = await res.json();

          currentRun = {
            timestamp: result.timestamp,
            date: new Date(result.timestamp).toLocaleString("en-US"),
            status: result.status,
            passed: result.summary.passed,
            total: result.summary.total,
          };

          btn.innerText = "Run Tests";
          btn.disabled = false;

          showResults(result);
        } catch (e) {
          btn.innerText = "Run Tests";
          btn.disabled = false;
          alert("Error: " + e.message);
        }
      }

      //  Detailed results display
      function showResults(result) {
        const summaryEl = document.getElementById("summary");
        const resultsPanel = document.getElementById("resultsPanel");
        const tbody = document.querySelector("#testsTable tbody");

        if (!summaryEl || !resultsPanel || !tbody) {
          console.error("❌ There are no elements found!", {
            summaryEl,
            resultsPanel,
            tbody,
          });
          return;
        }

        const passed = result.summary.passed;
        const total = result.summary.total;
        const statusEmoji = result.status === "PASSED" ? "✅" : "❌";
        summaryEl.innerHTML = `${statusEmoji} <strong>${result.status}</strong> (${passed}/${total})`;

        tbody.innerHTML = result.tests
          .map(
            (test) => `
    <tr class="test-row">
      <td class="test-title">${test.title}</td>
      <td class="col-status">
        <span class="status-badge ${test.status === "passed" ? "status-passed" : "status-failed"}">
          ${test.status.toUpperCase()}
        </span>
      </td>
      <td class="test-duration">${Math.round(test.duration / 1000)}s</td>
    </tr>
  `,
          )
          .join("");

        resultsPanel.classList.remove("hidden");
      }

      function hideResults() {
        const resultsPanel = document.getElementById("resultsPanel");

        if (resultsPanel) {
          resultsPanel.classList.add("hidden");
        }

        if (currentRun) {
          testHistory.unshift(currentRun);
          if (testHistory.length > 10) testHistory = testHistory.slice(0, 10);
          updateHistoryTable();
          currentRun = null;
        }
      }

      function updateHistoryTable() {
        const tbody = document.getElementById("historyBody");
        if (!tbody) return;

        const recentHistory = testHistory.slice(0, 10);
        tbody.innerHTML =
          recentHistory
            .map(
              (run, index) => `
    <tr class="history-row">
      <td class="history-date">${run.date}</td>
      <td class="col-result">
        <span class="history-badge ${run.status === "PASSED" ? "history-passed" : "history-failed"}">
          ${run.passed}/${run.total}
        </span>
      </td>
      <td class="col-actions">
        <button class="history-btn" onclick="showDetails(${index})">
          Подробно
        </button>
      </td>
    </tr>
  `,
            )
            .join("") ||
          '<tr><td colspan="3" class="no-history">No runs available</td></tr>';
      }

      function showDetails(index) {
        const run = testHistory[index];
        alert(
          `Run ${run.date}\n${run.passed}/${run.total} tests (${run.status})`,
        );
      }

      function openReport() {
        window.open("/report/index.html", "_blank");
        hideResults();
      }

      window.onload = function () {
        fetch("/history")
          .then((res) => res.json())
          .then((history) => {
            testHistory = history.map((run) => ({
              timestamp: run.timestamp,
              date: new Date(run.timestamp).toLocaleString("en-EN"),
              status: run.status,
              passed: run.summary.passed,
              total: run.summary.total,
            }));
            updateHistoryTable();
          })
          .catch(() => {
            console.log("History is empty or unavailable");
            updateHistoryTable();
          });
      };
    </script>
  </body>
</html>
